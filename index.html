<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liverpool Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #c8102e;
      color: white;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 40px;
    }

    .quiz-container {
      max-width: 700px;
      margin: auto;
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 15px;
    }

    .question {
      margin-bottom: 30px;
      text-align: left;
    }

    .question h3 {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }

    button {
      background: white;
      color: #c8102e;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #f0f0f0;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
    }

    .correct {
      color: lightgreen;
      font-weight: bold;
    }

    .wrong {
      color: yellow;
      font-weight: bold;
    }

    .answer-box {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <h1>Liverpool Quiz 🇬🇧⚽</h1>

  <div class="quiz-container">

    <!-- Question 1 -->
    <div class="question">
      <h3>1. What river is in Liverpool?</h3>

      <label>
        <input type="radio" name="q1" value="0">
        Thames
      </label>

      <label>
        <input type="radio" name="q1" value="1">
        Mersey
      </label>

      <label>
        <input type="radio" name="q1" value="0">
        Rhine
      </label>

      <div id="answer1"></div>
    </div>

    <!-- Question 2 -->
    <div class="question">
      <h3>2. Which famous band comes from Liverpool?</h3>

      <label>
        <input type="radio" name="q2" value="0">
        Queen
      </label>

      <label>
        <input type="radio" name="q2" value="1">
        The Beatles
      </label>

      <label>
        <input type="radio" name="q2" value="0">
        ABBA
      </label>

      <div id="answer2"></div>
    </div>

    <!-- Question 3 -->
    <div class="question">
      <h3>3. What is Liverpool FC’s stadium called?</h3>

      <label>
        <input type="radio" name="q3" value="0">
        Wembley
      </label>

      <label>
        <input type="radio" name="q3" value="0">
        Old Trafford
      </label>

      <label>
        <input type="radio" name="q3" value="1">
        Anfield
      </label>

      <div id="answer3"></div>
    </div>

    <!-- Question 4 -->
    <div class="question">
      <h3>4. What is the nickname of Liverpool?</h3>

      <label>
        <input type="radio" name="q4" value="1">
        The Pool
      </label>

      <label>
        <input type="radio" name="q4" value="0">
        Red City
      </label>

      <label>
        <input type="radio" name="q4" value="0">
        Music Town
      </label>

      <div id="answer4"></div>
    </div>

    <!-- Button -->
    <button onclick="checkQuiz()">Finish Quiz</button>

    <!-- Result -->
    <div id="result"></div>

  </div>

  <script>

    function checkQuiz() {

      let score = 0;

      const answers = {
        q1: "Mersey",
        q2: "The Beatles",
        q3: "Anfield",
        q4: "The Pool"
      };

      // Question 1
      let q1 = document.querySelector('input[name="q1"]:checked');

      if(q1) {
        if(q1.value == "1") {
          score++;
          document.getElementById("answer1").innerHTML =
            "<div class='answer-box correct'>✅ Correct!</div>";
        } else {
          document.getElementById("answer1").innerHTML =
            "<div class='answer-box wrong'>❌ Wrong! Correct answer: Mersey</div>";
        }
      }

      // Question 2
      let q2 = document.querySelector('input[name="q2"]:checked');

      if(q2) {
        if(q2.value == "1") {
          score++;
          document.getElementById("answer2").innerHTML =
            "<div class='answer-box correct'>✅ Correct!</div>";
        } else {
          document.getElementById("answer2").innerHTML =
            "<div class='answer-box wrong'>❌ Wrong! Correct answer: The Beatles</div>";
        }
      }

      // Question 3
      let q3 = document.querySelector('input[name="q3"]:checked');

      if(q3) {
        if(q3.value == "1") {
          score++;
          document.getElementById("answer3").innerHTML =
            "<div class='answer-box correct'>✅ Correct!</div>";
        } else {
          document.getElementById("answer3").innerHTML =
            "<div class='answer-box wrong'>❌ Wrong! Correct answer: Anfield</div>";
        }
      }

      // Question 4
      let q4 = document.querySelector('input[name="q4"]:checked');

      if(q4) {
        if(q4.value == "1") {
          score++;
          document.getElementById("answer4").innerHTML =
            "<div class='answer-box correct'>✅ Correct!</div>";
        } else {
          document.getElementById("answer4").innerHTML =
            "<div class='answer-box wrong'>❌ Wrong! Correct answer: The Pool</div>";
        }
      }

      // Final Score
      document.getElementById("result").innerHTML =
        "🏆 You got " + score + " / 4 points!";
    }

  </script>

</body>
</html>
