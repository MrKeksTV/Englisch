<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liverpool Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #c8102e;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .quiz-box {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 15px;
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
    }

    .question {
      margin: 25px 0;
      text-align: left;
    }

    button {
      background: white;
      color: #c8102e;
      border: none;
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #eee;
    }
  </style>
</head>

<body>

  <div class="quiz-box">
    <h1>Liverpool Quiz 🇬🇧⚽</h1>

    <div class="question">
      <p>1. What river is in Liverpool?</p>
      <input type="radio" name="q1"> Thames<br>
      <input type="radio" name="q1"> Mersey<br>
      <input type="radio" name="q1"> Rhine
    </div>

    <div class="question">
      <p>2. Which famous band comes from Liverpool?</p>
      <input type="radio" name="q2"> Queen<br>
      <input type="radio" name="q2"> The Beatles<br>
      <input type="radio" name="q2"> ABBA
    </div>

    <div class="question">
      <p>3. What is Liverpool FC’s stadium called?</p>
      <input type="radio" name="q3"> Wembley<br>
      <input type="radio" name="q3"> Old Trafford<br>
      <input type="radio" name="q3"> Anfield
    </div>

    <div class="question">
      <p>4. What is the nickname of Liverpool?</p>
      <input type="radio" name="q4"> The Pool<br>
      <input type="radio" name="q4"> Red City<br>
      <input type="radio" name="q4"> Music Town
    </div>

    <button onclick="alert('Great Job! 🎉')">
      Finish Quiz
    </button>

  </div>

</body>
</html>
